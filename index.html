<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego Enlazados</title>

<!-- 🔥 GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Y5WC0FBFZZ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}

gtag('js', new Date());

gtag('config', 'G-Y5WC0FBFZZ', {
  page_title: 'Juego Enlazados',
  page_location: window.location.href
});
</script>

<style>
html, body {
    height: 100%;
    margin: 0;
    font-family: 'Segoe UI';
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to top, #4facfe, #00f2fe);
    color: white;
    text-align: center;
}

#gameBox {
    width: 90%;
    max-width: 420px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

#word {
    font-size: 8vw;
    letter-spacing: 10px;
    margin: 20px 0;
}

.letters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.letters button {
    width: 12vw;
    height: 12vw;
    max-width: 55px;
    max-height: 55px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    font-size: 5vw;
    cursor: pointer;
    background: white;
    color: #333;
}

.correct { background: #4CAF50 !important; color: white; }
.wrong { background: #f44336 !important; color: white; }

#progress {
    height: 10px;
    margin-top: 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    overflow: hidden;
}

#bar {
    height: 100%;
    width: 0%;
    background: #00ffcc;
}

#coinRain {
    position: fixed;
    top: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.coin {
    position: absolute;
    top: -50px;
    font-size: 24px;
    animation: fall linear forwards;
}

@keyframes fall {
    to { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body>

<div id="gameBox">
    <h2>🎮 Enlazados Game</h2>
    <p id="hint"></p>

    <div id="word"></div>
    <div class="letters" id="letters"></div>

    <div id="progress"><div id="bar"></div></div>

    <div id="result"></div>
    <div id="coins">🪙 Monedas: 0</div>
</div>

<div id="coinRain"></div>

<script>

/* ===== DATA ===== */
const words = [
  { palabra: "CASCO", pista: "Protección para la cabeza" },
  { palabra: "ARNES", pista: "Evita caídas en alturas" },
  { palabra: "BOTAS", pista: "Protección para los pies" },
  { palabra: "GUANTES", pista: "Protegen las manos" },
  { palabra: "GAFAS", pista: "Protección visual" },
  { palabra: "CHALECO", pista: "Alta visibilidad en obra" }
];

let current, word, hidden;
let coins = 0;
let correctCount = 0;
let startTime = Date.now();

/* ===== ELEMENTOS ===== */
const wordDiv = document.getElementById("word");
const lettersDiv = document.getElementById("letters");
const resultDiv = document.getElementById("result");
const coinsDiv = document.getElementById("coins");
const bar = document.getElementById("bar");
const hintDiv = document.getElementById("hint");

/* ===== FUNCIONES ===== */

function nuevaPalabra() {
    lettersDiv.innerHTML = "";
    resultDiv.innerHTML = "";

    current = words[Math.floor(Math.random() * words.length)];
    word = current.palabra;
    hidden = Array(word.length).fill("_");

    correctCount = 0;
    startTime = Date.now();

    hintDiv.innerText = current.pista;

    renderWord();
    updateProgress();
    createLetters();
}

function renderWord() {
    wordDiv.innerText = hidden.join(" ");
}

function updateProgress() {
    bar.style.width = (correctCount / word.length * 100) + "%";
}

function createLetters() {
    const alphabet = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ";

    alphabet.split("").forEach(letter => {
        const btn = document.createElement("button");
        btn.innerText = letter;
        btn.onclick = () => checkLetter(letter, btn);
        lettersDiv.appendChild(btn);
    });
}

function lanzarMonedas() {
    const container = document.getElementById("coinRain");

    for (let i = 0; i < 25; i++) {
        const coin = document.createElement("div");
        coin.classList.add("coin");
        coin.innerText = "🪙";
        coin.style.left = Math.random() * 100 + "vw";
        coin.style.animationDuration = (Math.random() * 2 + 2) + "s";
        container.appendChild(coin);
        setTimeout(() => coin.remove(), 3000);
    }
}

function checkLetter(letter, btn) {

    gtag('event', 'click_letra', { letra: letter });

    btn.disabled = true;

    let correct = false;

    for (let i = 0; i < word.length; i++) {
        if (word[i] === letter && hidden[i] === "_") {
            hidden[i] = letter;
            correct = true;
            correctCount++;
        }
    }

    if (correct) {
        btn.classList.add("correct");
        coins += 2;
    } else {
        btn.classList.add("wrong");
    }

    renderWord();
    updateProgress();
    coinsDiv.innerText = "🪙 Monedas: " + coins;

    if (hidden.join("") === word) {

        const tiempo = Math.floor((Date.now() - startTime) / 1000);

        resultDiv.innerHTML = "🎉 ¡Ganaste! +10 monedas";
        coins += 10;
        coinsDiv.innerText = "🪙 Monedas: " + coins;

        lanzarMonedas();

        // 📊 Evento básico
        gtag('event', 'juego_completado', {
            palabra: word,
            monedas: coins
        });

        // 🚀 EVENTO PRO
        gtag('event', 'fin_nivel', {
            resultado: 'ganado',
            palabra: word,
            monedas_totales: coins,
            tiempo_segundos: tiempo,
            longitud_palabra: word.length
        });

        // 👉 siguiente nivel automático
        setTimeout(nuevaPalabra, 2000);
    }
}

/* ===== TRACK INICIO ===== */
window.onload = () => {
    gtag('event', 'inicio_juego');
    nuevaPalabra();
};

</script>

</body>
</html>
