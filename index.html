<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego Enlazados</title>

<!-- 🔥 GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Y5WC0FBFZZ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}

gtag('js', new Date());
gtag('config', 'G-Y5WC0FBFZZ');
</script>

<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    font-family:'Segoe UI';
}

body {
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:10px;
    background: linear-gradient(to top, #4facfe, #00f2fe);
    color:white;
    text-align:center;
}

#gameBox {
    width:100%;
    max-width:420px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
}

#level {
    font-size:18px;
    margin-bottom:10px;
}

#word {
    font-size: clamp(28px, 5vw, 42px);
    letter-spacing:10px;
    margin:20px 0;
}

.letters {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    max-width:320px;
    margin:auto;
}

.letters button {
    width: clamp(40px, 8vw, 55px);
    height: clamp(40px, 8vw, 55px);
    margin:5px;
    border:none;
    border-radius:10px;
    font-size: clamp(18px, 3vw, 26px);
    cursor:pointer;
    background:white;
    color:#333;
}

.correct { background:#4CAF50 !important; color:white; }
.wrong { background:#f44336 !important; color:white; }

#progress {
    height:10px;
    margin-top:15px;
    border-radius:10px;
    background:rgba(255,255,255,0.2);
    overflow:hidden;
}

#bar {
    height:100%;
    width:0%;
    background:#00ffcc;
}

#coinRain {
    position:fixed;
    top:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

.coin {
    position:absolute;
    top:-50px;
    font-size:24px;
    animation:fall linear forwards;
}

@keyframes fall {
    to { transform: translateY(100vh); opacity:0; }
}
</style>
</head>

<body>

<div id="gameBox">
    <h2>🎮 Enlazados Game- Adivina el elemento de seguridad</h2>

    <div id="level"></div>
    <div id="word"></div>
    <div class="letters" id="letters"></div>

    <div id="progress"><div id="bar"></div></div>

    <div id="result"></div>
    <div id="coins">🪙 Monedas: 0</div>
</div>

<div id="coinRain"></div>

<script>

/* ===== NIVELES ===== */
const levels = [
  "CASCO",
  "ARNES",
  "BOTAS",
  "GUANTES",
  "GAFAS",
  "CHALECO"
];

let currentLevel = 0;
let word, hidden;
let coins = 0;
let correctCount = 0;
let wrongCount = 0; // 🔥 NUEVO
let startTime = Date.now();

/* ===== ELEMENTOS ===== */
const wordDiv = document.getElementById("word");
const lettersDiv = document.getElementById("letters");
const resultDiv = document.getElementById("result");
const coinsDiv = document.getElementById("coins");
const bar = document.getElementById("bar");
const levelDiv = document.getElementById("level");

/* ===== FUNCIONES ===== */

function iniciarNivel() {

    if (currentLevel >= levels.length) {
        finDelJuego();
        return;
    }

    lettersDiv.innerHTML = "";
    resultDiv.innerHTML = "";

    word = levels[currentLevel];
    hidden = Array(word.length).fill("_");

    correctCount = 0;
    wrongCount = 0; // 🔥 RESET ERRORES
    startTime = Date.now();

    levelDiv.innerText = "Nivel " + (currentLevel + 1);

    renderWord();
    updateProgress();
    createLetters();
}

function renderWord() {
    wordDiv.innerText = hidden.join(" ");
}

function updateProgress() {
    bar.style.width = (correctCount / word.length * 100) + "%";
}

function createLetters() {
    const alphabet = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ";

    alphabet.split("").forEach(letter => {
        const btn = document.createElement("button");
        btn.innerText = letter;
        btn.onclick = () => checkLetter(letter, btn);
        lettersDiv.appendChild(btn);
    });
}

function lanzarMonedas() {
    const container = document.getElementById("coinRain");

    for (let i = 0; i < 30; i++) {
        const coin = document.createElement("div");
        coin.classList.add("coin");
        coin.innerText = "🪙";
        coin.style.left = Math.random() * 100 + "vw";
        coin.style.animationDuration = (Math.random() * 2 + 2) + "s";
        container.appendChild(coin);
        setTimeout(() => coin.remove(), 3000);
    }
}

function reiniciarNivel() {

    resultDiv.innerHTML = "💀 Perdiste... reiniciando nivel";

    // 📊 evento de derrota
    gtag('event', 'nivel_perdido', {
        nivel: currentLevel + 1,
        errores: wrongCount
    });

    setTimeout(() => {
        iniciarNivel();
    }, 2000);
}

function checkLetter(letter, btn) {

    gtag('event', 'click_letra', { letra: letter });

    btn.disabled = true;

    let correct = false;

    for (let i = 0; i < word.length; i++) {
        if (word[i] === letter && hidden[i] === "_") {
            hidden[i] = letter;
            correct = true;
            correctCount++;
        }
    }

    if (correct) {
        btn.classList.add("correct");
        coins += 2;
    } else {
        btn.classList.add("wrong");
        wrongCount++; // 🔥 SUMA ERROR
    }

    renderWord();
    updateProgress();
    coinsDiv.innerText = "🪙 Monedas: " + coins;

    // 💣 SI FALLA 3 VECES → REINICIO
    if (wrongCount >= 3) {
        reiniciarNivel();
        return;
    }

    if (hidden.join("") === word) {

        const tiempo = Math.floor((Date.now() - startTime) / 1000);

        coins += 10;
        coinsDiv.innerText = "🪙 Monedas: " + coins;

        lanzarMonedas();

        resultDiv.innerHTML = "🎉 Nivel superado";

        // 📊 evento por nivel
        gtag('event', 'nivel_completado', {
            nivel: currentLevel + 1,
            palabra: word,
            tiempo: tiempo,
            monedas: coins
        });

        currentLevel++;

        setTimeout(iniciarNivel, 2000);
    }
}

/* ===== FINAL ===== */
function finDelJuego() {

    resultDiv.innerHTML = "🏆 ¡Completaste todos los niveles!";
    lanzarMonedas();

    gtag('event', 'juego_terminado', {
        niveles: levels.length,
        monedas_finales: coins
    });
}

/* ===== INICIO ===== */
window.onload = () => {
    gtag('event', 'inicio_juego');
    iniciarNivel();
};

</script>
