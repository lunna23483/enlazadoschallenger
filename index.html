<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego Enlazados</title>

<!-- 🔥 GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Y5WC0FBFZZ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}

gtag('js', new Date());

gtag('config', 'G-Y5WC0FBFZZ', {
  page_title: 'Juego Enlazados',
  page_location: window.location.href
});
</script>

<style>

/* ===== RESET Y BASE ===== */
html, body {
    height: 100%;
    margin: 0;
    font-family: 'Segoe UI';
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to top, #4facfe, #00f2fe);
    color: white;
    text-align: center;
}

/* ===== CONTENEDOR ===== */
#gameBox {
    width: 90%;
    max-width: 420px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* ===== TEXTOS ===== */
h2 {
    margin-bottom: 10px;
}

#word {
    font-size: 8vw;
    letter-spacing: 10px;
    margin: 20px 0;
}

/* ===== BOTONES ===== */
.letters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.letters button {
    width: 12vw;
    height: 12vw;
    max-width: 55px;
    max-height: 55px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    font-size: 5vw;
    cursor: pointer;
    background: white;
    color: #333;
    transition: 0.2s;
    -webkit-tap-highlight-color: transparent;
}

.letters button:hover {
    transform: scale(1.1);
}

.correct {
    background: #4CAF50 !important;
    color: white;
}

.wrong {
    background: #f44336 !important;
    color: white;
}

/* ===== RESULTADOS ===== */
#result {
    font-size: 18px;
    margin-top: 15px;
    min-height: 25px;
}

#coins {
    margin-top: 10px;
}

/* ===== BARRA PROGRESO ===== */
#progress {
    height: 10px;
    margin-top: 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    overflow: hidden;
}

#bar {
    height: 100%;
    width: 0%;
    background: #00ffcc;
    transition: width 0.3s;
}

/* ===== MOBILE EXTRA ===== */
@media (max-width: 480px) {
    #word {
        font-size: 9vw;
    }

    .letters button {
        width: 13vw;
        height: 13vw;
    }
}

</style>
</head>

<body>

<div id="gameBox">

    <h2>🎮 Enlazados Game</h2>
    <p>Adivina el elemento de seguridad</p>

    <div id="word"></div>

    <div class="letters" id="letters"></div>

    <div id="progress">
        <div id="bar"></div>
    </div>

    <div id="result"></div>
    <div id="coins">🪙 Monedas: 0</div>

</div>

<script>

/* ===== DATOS ===== */
const words = ["CASCO", "ARNES", "BOTAS"];
let word = words[Math.floor(Math.random() * words.length)];

let hidden = Array(word.length).fill("_");
let coins = 0;
let correctCount = 0;

/* ===== ELEMENTOS ===== */
const wordDiv = document.getElementById("word");
const lettersDiv = document.getElementById("letters");
const resultDiv = document.getElementById("result");
const coinsDiv = document.getElementById("coins");
const bar = document.getElementById("bar");

/* ===== FUNCIONES ===== */
function renderWord() {
    wordDiv.innerText = hidden.join(" ");
}

function updateProgress() {
    const percent = (correctCount / word.length) * 100;
    bar.style.width = percent + "%";
}

function createLetters() {
    const alphabet = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ";

    alphabet.split("").forEach(letter => {
        const btn = document.createElement("button");
        btn.innerText = letter;

        btn.onclick = () => checkLetter(letter, btn);

        lettersDiv.appendChild(btn);
    });
}

function checkLetter(letter, btn) {

    // 📊 Evento: click letra
    gtag('event', 'click_letra', {
        letra: letter
    });

    btn.disabled = true;

    let correct = false;

    for (let i = 0; i < word.length; i++) {
        if (word[i] === letter && hidden[i] === "_") {
            hidden[i] = letter;
            correct = true;
            correctCount++;
        }
    }

    if (correct) {
        btn.classList.add("correct");
        coins += 2;
    } else {
        btn.classList.add("wrong");
    }

    renderWord();
    updateProgress();
    coinsDiv.innerText = "🪙 Monedas: " + coins;

    if (hidden.join("") === word) {

        resultDiv.innerHTML = "🎉 ¡Ganaste! +10 monedas";

        coins += 10;
        coinsDiv.innerText = "🪙 Monedas: " + coins;

        // 📊 Evento: juego completado
        gtag('event', 'juego_completado', {
            palabra: word,
            monedas: coins
        });
    }
}

/* ===== INIT ===== */
window.onload = () => {
    gtag('event', 'inicio_juego');
};

renderWord();
createLetters();

</script>

</body>
</html>
